<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical Slider</title>
    <link rel="stylesheet" href="styles.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="slider-container">
      <div class="left-slide">
        <div style="background-color: #fd3555;">
          <h1>Red Bird</h1>
          <p>all in Red</p>
        </div>
        <div style="background-color: #2a86ba">
          <h1>Blue Turtle</h1>
          <p>with it's sky-blue ocean</p>
        </div>
        <div style="background-color: #252e33;">
          <h1>Lonely Leopard</h1>
          <p>in the wilderness</p>
        </div>
        <div style="background-color: #ffb866;">
          <h1>Golden Elephant</h1>
          <p>in the sunset</p>
        </div>
      </div>
      <div class="right-slide">
        <div style="background-image: url(../images/project26Image/goldenElephant.jpeg);"></div>
        <div style="background-image: url(../images/project26Image/greenLeopard.jpg);"></div>
        <div style="background-image: url(../images/project26Image/blueTurtle.jpg);"></div>
        <div style="background-image: url(../images/project26Image/redBird.jpeg);"></div>
      </div>
      <div class="action-buttons">
        <button class="down-button">
          <i class="fas fa-arrow-down"></i>
        </button>
        <button class="up-button">
          <i class="fas fa-arrow-up"></i>
        </button>
      </div>
    </div>


    <script src="scripts.js"></script>
  </body>
</html>
