<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Carousel</title>
    <link rel="stylesheet" href="styles.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="carousel">
      <div class="image-container" id="imgs">
        <img src="../images/project33Image/blueTurtle.jpg" alt="first-image">
        <img src="../images/project33Image/goldenButterfly.jpeg" alt="second-image">
        <img src="../images/project33Image/goldenElephant.jpeg" alt="third-image">
        <img src="../images/project33Image/greenLeopard.jpg" alt="fourth-image">
      </div>

      <div class="buttons-container">
        <button id="left" class="btn">Prev</button>
        <button id="right" class="btn">Next</button>
      </div>
    </div>


    <script src="scripts.js"></script>
  </body>
</html>
