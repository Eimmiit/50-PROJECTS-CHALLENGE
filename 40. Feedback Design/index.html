<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Ui design</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="panel" class="panel-container">
      <strong>How satisfied are you with our customer performance</strong>
      <div class="ratings-container">
        <div class="rating">
          <img src="../images/project40Image/sad-face.png" alt="" />
          <small>Unhappy</small>
        </div>
        <div class="rating">
          <img src="../images/project40Image/happiness.png" alt="" />
          <small>Neutral</small>
        </div>
        <div class="rating active">
          <img src="../images/project40Image/happy-face.png" alt="" />
          <small>Satisfied</small>
        </div>
      </div>
      <button class="btn" id="send">Send Review</button>
    </div>


    <script src="scripts.js"></script>
  </body>
</html>
