<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch the insect</title>
    <link rel="stylesheet" href="styles.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="screen">
      <h1>Catch the Insect</h1>
      <button class="btn" id="start-btn">
        Play Game
      </button>
    </div>
    <div class="screen">
      <h1>What is your "favourite" insect?</h1>
      <ul class="insects-list">
        <li><Button class="choose-insect-btn">
          <p>Fly</p>
          <img src="../images/project46Image/fly.png" alt="fly">
        </Button></li>
        <li><Button class="choose-insect-btn">
          <p>Mosquito</p>
          <img src="../images/project46Image/mosquito.png" alt="mosquito">
        </Button></li>
        <li><Button class="choose-insect-btn">
          <p>Spider</p>
          <img src="../images/project46Image/spider.png" alt="spider">
        </Button></li>
        <li><Button class="choose-insect-btn">
          <p>Roach</p>
          <img src="../images/project46Image/roach.png" alt="roach">
        </Button></li>
      </ul>
    </div>

    <div class="screen game-container" id="game-container">
      <h3 id="time" class="time">Time 00:00</h3>
      <h3 id="score" class="score">Score: 0</h3>
      <h5 id="message" class="message">Are you annoyed yet? <br>
      You are playing an impossible game!!</h5>

      <!-- <div class="insect">
        <img src="../images/project46Image/roach.png" alt="">
      </div> -->
    </div>



    <script src="scripts.js"></script>
  </body>
</html>
