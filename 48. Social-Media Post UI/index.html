<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Post UI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="card">
    <div class="profile">
      <img src="https://i.pravatar.cc/170" alt="profile picture">
      <div class="user-info">
        <h2>Eimmiit Mich</h2>
        <p>@rivamilton</p>
      </div>
    </div>
    <div class="post-input">
      <textarea placeholder="What's on your mind"></textarea>
      <hr>
      <div class="post-actions">

        <div class="icons">
          <div class="icon"><i class="fa-solid fa-camera"></i>
            <span class="tooltip">Take a photo</span>
          </div>
          <div class="icon"><i class="fa-solid fa-image"></i>
            <span class="tooltip">add image</span>
          </div>
          <div class="icon"><i class="fa-regular fa-face-frown"></i>
            <span class="tooltip">dislike</span>
          </div>
          <div class="icon"><i class="fa-solid fa-location-arrow"></i>
            <span class="tooltip">Share</span>
          </div>
          <div class="icon"><i class="fa-solid fa-ellipsis"></i>
            <span class="tooltip">more</span>
          </div>
        </div>

        <button>Post</button>

      </div>
    </div>
    <div class="posts"></div>
  </div>



  <script src="scripts.js"></script>
</body>

</html>
